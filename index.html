<!DOCTYPE html>
<html>
<head>
    <title>Pay Now</title>

    <script>
        function getAmount() {
            const params = new URLSearchParams(window.location.search);
            return params.get("am") || "0";
        }

        function pay() {
            let amount = getAmount();

            let upi = "paytmqr2810050501011fqaxn5dn685@paytm"; // 👈 apna UPI

            let link = `upi://pay?pa=${upi}&am=${amount}&cu=INR`;

            window.location.href = link;
        }

        window.onload = pay;
    </script>
</head>

<body style="text-align:center; margin-top:50px; font-family:Arial;">

    <h2>Redirecting to Payment...</h2>
    <p>If not redirected, click below 👇</p>

    <script>
        let amount = new URLSearchParams(window.location.search).get("am") || "0";
        let upi = "paytmqr2810050501011fqaxn5dn685@paytm";

        document.write(`
            <a href="upi://pay?pa=${upi}&am=${amount}&cu=INR">
                <button style="padding:10px 20px; font-size:16px;">
                    Pay ₹${amount}
                </button>
            </a>
        `);
    </script>

</body>
</html>
